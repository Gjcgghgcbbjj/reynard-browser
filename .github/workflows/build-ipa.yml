name: Build IPA and TrollStore TIPA

on:
  workflow_dispatch:
    inputs:
      xcode_version:
        description: Xcode application name installed on the runner
        required: true
        default: Xcode_26.4.1.app
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: build-ipa-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build iOS archive and packages
    runs-on: macos-26
    timeout-minutes: 360

    env:
      GH_TOKEN: ${{ github.token }}
      RUST_BACKTRACE: "1"
      XCODE_APP: ${{ inputs.xcode_version }}

    steps:
      - name: Checkout application source
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Select Xcode and reclaim disk space
        shell: bash
        run: |
          set -euo pipefail
          XCODE_PATH="/Applications/${XCODE_APP}"
          test -d "$XCODE_PATH"
          sudo xcode-select --switch "$XCODE_PATH/Contents/Developer"
          for candidate in /Applications/Xcode*.app; do
            if [[ "$candidate" != "$XCODE_PATH" ]]; then
              sudo rm -rf "$candidate"
            fi
          done
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* || true
          {
            sw_vers
            xcodebuild -version
            xcrun --sdk iphoneos --show-sdk-version
            df -h /
          } | tee build-environment.log

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install ldid
          rustup target add aarch64-apple-ios
          python3 --version
          rustc --version
          cargo --version
          ldid -h >/dev/null 2>&1 || true

      - name: Initialize idevice source
        shell: bash
        run: git submodule update --init --depth 1 support/idevice

      - name: Restore Rust dependency caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            support/idevice/target
          key: ios-rust-${{ runner.os }}-${{ hashFiles('support/idevice/Cargo.lock', 'support/idevice/ffi/Cargo.toml') }}
          restore-keys: |
            ios-rust-${{ runner.os }}-

      - name: Download and restore matching Gecko artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_name="$(./tools/development/gecko-artifact.sh key "$XCODE_APP")"
          artifact_id="$({
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100" \
              --jq '.artifacts[] | select(.expired == false) | [.created_at, .id, .name] | @tsv'
          } | awk -F $'\t' -v name="$artifact_name" '$3 == name { print }' \
            | LC_ALL=C sort -r \
            | sed -n '1p' \
            | cut -f 2)"

          if [[ -z "$artifact_id" ]]; then
            echo "::error::No unexpired Gecko artifact named $artifact_name was found."
            echo "Run the Build Gecko iOS Artifact workflow with Xcode $XCODE_APP, then retry this workflow."
            exit 1
          fi

          download_dir="$(mktemp -d)"
          trap 'rm -rf "$download_dir"' EXIT
          gh api \
            "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" \
            > "$download_dir/artifact.zip"
          unzip -q "$download_dir/artifact.zip" -d "$download_dir/payload"

          archive="$download_dir/payload/$artifact_name.tar.gz"
          checksum="$download_dir/payload/$artifact_name.tar.gz.sha256"
          test -s "$archive"
          test -s "$checksum"
          expected="$(awk 'NR == 1 { print $1 }' "$checksum")"
          actual="$(shasum -a 256 "$archive" | awk '{ print $1 }')"
          test "$actual" = "$expected"

          ./tools/development/gecko-artifact.sh restore "$archive" "$XCODE_APP"
          ./tools/development/gecko-artifact.sh verify "$XCODE_APP"
          {
            echo "artifact_name=$artifact_name"
            echo "artifact_id=$artifact_id"
            echo "sha256=$actual"
          } | tee gecko-artifact-download.log

      - name: Build idevice dependency
        shell: zsh {0}
        run: |
          set -euo pipefail
          ./tools/development/build-idevice.sh 2>&1 | tee build-idevice.log

      - name: Validate Xcode project
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -list -project browser/Reynard.xcodeproj 2>&1 | tee xcode-project-list.log

      - name: Build application archive
        shell: bash
        run: |
          set -euo pipefail
          ./tools/release/build-app.sh 2>&1 | tee build-app.log

      - name: Package IPA and TrollStore builds
        shell: bash
        run: |
          set -euo pipefail
          ./tools/release/create-ipa.sh 2>&1 | tee create-ipa.log
          test -s dist/Reynard.ipa
          test -s dist/Reynard-TrollStore.tipa
          test -s dist/Reynard-Jailbroken.ipa
          shasum -a 256 dist/Reynard.ipa dist/Reynard-TrollStore.tipa dist/Reynard-Jailbroken.ipa | tee dist/SHA256SUMS.txt

      - name: Upload TrollStore test package
        uses: actions/upload-artifact@v4
        with:
          name: vulpra-trollstore-${{ github.run_id }}
          path: |
            dist/Reynard-TrollStore.tipa
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload alternate installable packages
        uses: actions/upload-artifact@v4
        with:
          name: vulpra-ios-alternates-${{ github.run_id }}
          path: |
            dist/Reynard.ipa
            dist/Reynard-Jailbroken.ipa
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reynard-build-logs-${{ github.run_id }}
          path: |
            *.log
            dist/Reynard.xcarchive/Info.plist
          if-no-files-found: warn
          retention-days: 14
